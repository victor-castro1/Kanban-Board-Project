<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Quadro Kanban - Gerenciamento de Tarefas com Drag and Drop">
    <title>Quadro Kanban</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Cabeçalho Principal -->
    <header class="header">
        <h1 class="header__title">Quadro Kanban</h1>
        <button class="header__button" id="btnNovoCard">
            <span class="icon">+</span> Novo Card
        </button>
    </header>

    <!-- Quadro Principal -->
    <main class="board">
        <!-- Coluna: A Fazer -->
        <section class="column" data-status="todo">
            <header class="column__header">
                <h2 class="column__title">A Fazer</h2>
                <span class="column__count" id="count-todo">0</span>
            </header>
            <div class="card-container" id="todo"></div>
        </section>

        <!-- Coluna: Fazendo -->
        <section class="column" data-status="doing">
            <header class="column__header">
                <h2 class="column__title">Fazendo</h2>
                <span class="column__count" id="count-doing">0</span>
            </header>
            <div class="card-container" id="doing"></div>
        </section>

        <!-- Coluna: Concluído -->
        <section class="column" data-status="done">
            <header class="column__header">
                <h2 class="column__title">Concluído</h2>
                <span class="column__count" id="count-done">0</span>
            </header>
            <div class="card-container" id="done"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
